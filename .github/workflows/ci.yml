name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'

env:
  CARGO_TERM_COLOR: always

jobs:
  # ============================================
  # CODE QUALITY (Linux - fast)
  # ============================================

  quality:
    name: Format, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install Linux dependencies
        uses: awalsh128/cache-apt-pkgs-action@553a35bb8ebd9fcabcb1c9451aa4c98e1b4ca8a9 # v1
        with:
          packages: libssl-dev pkg-config libxdo-dev
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo test --all-features

  # ============================================
  # SECURITY (all parallel, no Rust build needed)
  # ============================================

  cargo-deny:
    name: Dependency Policy & Advisories
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          command-arguments: --config .cargo/deny.toml

  gitleaks:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trivy:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          ignore-unfixed: true

  semgrep:
    name: Static Analysis
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - run: semgrep scan --config auto --error --exclude-rule "javascript.lang.security.detect-insecure-websocket.detect-insecure-websocket"

  # ============================================
  # BUILD (tags + PRs only)
  # ============================================

  build:
    needs: [quality, cargo-deny, gitleaks, trivy, semgrep]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: pc-bridge.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: pc-bridge
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config libxdo-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      # The Linux job above runs the cross-platform tests; run the Windows-only
      # #[cfg(windows)] tests (executor, audio, gpu, process watcher) here, since
      # they never compile on Linux and would otherwise never execute in CI.
      - name: Run Windows-only tests
        if: matrix.os == 'windows-latest'
        run: cargo test --target ${{ matrix.target }}

      - name: Check binary size
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $binary = "target/${{ matrix.target }}/release/pc-bridge.exe"
          $size = (Get-Item $binary).Length
          $sizeMB = [math]::Round($size / 1MB, 2)
          Write-Host "Binary size: $sizeMB MB ($size bytes)"
          if ($size -gt 15MB) {
            Write-Host "::warning::Binary size ($sizeMB MB) exceeds 15MB threshold"
          }
          if ($size -gt 25MB) {
            Write-Host "::error::Binary size ($sizeMB MB) exceeds 25MB limit"
            exit 1
          }

      - name: Sign Windows binary
        if: matrix.os == 'windows-latest' && startsWith(github.ref, 'refs/tags/v')
        env:
          SIGNING_CERT_PFX: ${{ secrets.SIGNING_CERT_PFX }}
          SIGNING_CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
        run: |
          $pfxBytes = [Convert]::FromBase64String($env:SIGNING_CERT_PFX)
          $pfxPath = "$env:RUNNER_TEMP\cert.pfx"
          [IO.File]::WriteAllBytes($pfxPath, $pfxBytes)
          
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" | Sort-Object -Descending | Select-Object -First 1
          & $signtool.FullName sign `
            /f $pfxPath `
            /p $env:SIGNING_CERT_PASSWORD `
            /fd SHA256 `
            /tr http://timestamp.digicert.com `
            /td SHA256 `
            /d "PC Bridge" `
            /du "https://github.com/dank0i/pc-bridge" `
            target/${{ matrix.target }}/release/pc-bridge.exe
          
          Remove-Item $pfxPath

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: pc-bridge-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}

  # ============================================
  # RELEASE (tags only, after build)
  # ============================================

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: pc-bridge-x86_64-pc-windows-msvc
          path: windows

      - name: Download Linux artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: pc-bridge-x86_64-unknown-linux-gnu
          path: linux

      - name: Rename artifacts
        run: |
          mv windows/pc-bridge.exe ./pc-bridge-windows.exe
          mv linux/pc-bridge ./pc-bridge-linux
          chmod +x pc-bridge-linux
          rm -rf windows linux

      # Sign a per-platform {version, sha256} manifest with minisign. The updater
      # fetches + verifies this manifest, trusts its SIGNED version for anti-rollback,
      # and authenticates the binary by SHA-256 against the manifest's hash. That hash
      # chain makes a separate per-binary signature and a standalone .sha256 both
      # redundant, so we ship only the binary + manifest + manifest signature (3 files
      # per platform). Skips (with a warning) if MINISIGN_SECRET_KEY isn't set;
      # clients then refuse to auto-update (they require a signed manifest), which is
      # the intended fail-closed behavior.
      - name: Sign release manifests (minisign)
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          if [ -z "$MINISIGN_SECRET_KEY" ]; then
            echo "::warning::MINISIGN_SECRET_KEY not set; no signed manifest - clients will refuse to auto-update"
            exit 0
          fi
          sudo apt-get update && sudo apt-get install -y minisign
          printf '%s' "$MINISIGN_SECRET_KEY" > minisign.key
          VERSION="${GITHUB_REF_NAME#v}"
          for asset in pc-bridge-windows.exe pc-bridge-linux; do
            HASH=$(sha256sum "$asset" | awk '{print $1}')
            printf '{"version":"%s","sha256":"%s"}' "$VERSION" "$HASH" > "$asset.manifest"
            minisign -S -s minisign.key -m "$asset.manifest"
          done
          rm -f minisign.key

      - name: Upload assets to release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            pc-bridge-windows.exe
            pc-bridge-linux
            *.manifest
            *.minisig

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: gh release edit "$TAG" --draft=false --repo "$REPO"
