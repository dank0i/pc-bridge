# cargo-deny configuration
# Run: cargo install cargo-deny && cargo deny --config .cargo/deny.toml check
# Docs: https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
ignore = [
    # `instant` is unmaintained, pulled in transitively via notify 7 →
    # notify-types → instant.  Author recommends `web-time` instead, but
    # notify hasn't migrated yet.  Not a security CVE, just a maintenance
    # notice - revisit when notify drops the dep.
    "RUSTSEC-2024-0384",
    # egui/eframe dependency tree (settings UI). Unmaintained notices, no fixes:
    "RUSTSEC-2026-0192", # ttf-parser unmaintained (egui font parsing)
    "RUSTSEC-2024-0436", # paste unmaintained (egui macros)
    # anyhow: unsoundness only when calling Error::downcast_mut() on a
    # context-wrapped error. pc-bridge never does that. Revisit when anyhow ships a fix.
    "RUSTSEC-2026-0190",
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-3.0",
    "CC0-1.0",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
    "OFL-1.1",            # egui bundled fonts (Ubuntu, emoji)
    "LicenseRef-UFL-1.0", # Ubuntu Font License on the bundled Ubuntu font
]
confidence-threshold = 0.8

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = []
skip = []

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
