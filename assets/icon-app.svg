<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1B2E"/>
      <stop offset="100%" stop-color="#13111C"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>

  <!-- Left: Monitor (center x=100, y=256) -->
  <rect x="40" y="202" width="120" height="86" rx="9" fill="url(#grad)"/>
  <rect x="52" y="210" width="96" height="70" rx="5" fill="#fff" opacity="0.25"/>
  <rect x="96" y="288" width="8" height="16" fill="url(#grad)"/>
  <rect x="76" y="304" width="48" height="6" rx="3" fill="url(#grad)"/>

  <!-- Center: WiFi arcs radiating both directions (center x=256, y=256) -->
  <circle cx="256" cy="256" r="8" fill="url(#grad)"/>
  <!-- Right arcs -->
  <path d="M 270 242 A 18 18 0 0 1 270 270"
        fill="none" stroke="#A78BFA" stroke-width="7" stroke-linecap="round"/>
  <path d="M 284 232 A 30 30 0 0 1 284 280"
        fill="none" stroke="#A78BFA" stroke-width="7" stroke-linecap="round"/>
  <path d="M 298 222 A 42 42 0 0 1 298 290"
        fill="none" stroke="#A78BFA" stroke-width="7" stroke-linecap="round"/>
  <!-- Left arcs -->
  <path d="M 242 242 A 18 18 0 0 0 242 270"
        fill="none" stroke="#A78BFA" stroke-width="7" stroke-linecap="round"/>
  <path d="M 228 232 A 30 30 0 0 0 228 280"
        fill="none" stroke="#A78BFA" stroke-width="7" stroke-linecap="round"/>
  <path d="M 214 222 A 42 42 0 0 0 214 290"
        fill="none" stroke="#A78BFA" stroke-width="7" stroke-linecap="round"/>

  <!-- Right: House (center x=412, y=256) -->
  <!-- Chimney (behind roof) -->
  <rect x="438" y="202" width="14" height="46" rx="2" fill="url(#grad)"/>
  <!-- Roof -->
  <polygon points="412,204 352,252 472,252" fill="url(#grad)"/>
  <!-- Walls -->
  <rect x="358" y="252" width="108" height="56" rx="4" fill="url(#grad)"/>
  <!-- Window -->
  <rect x="372" y="264" width="26" height="26" rx="3" fill="#fff" opacity="0.2"/>
  <line x1="385" y1="264" x2="385" y2="290" stroke="#7C3AED" stroke-width="2"/>
  <line x1="372" y1="277" x2="398" y2="277" stroke="#7C3AED" stroke-width="2"/>
  <!-- Door -->
  <rect x="428" y="264" width="24" height="44" rx="3" fill="#fff" opacity="0.25"/>
  <circle cx="446" cy="286" r="3" fill="#7C3AED" opacity="0.6"/>
</svg>
